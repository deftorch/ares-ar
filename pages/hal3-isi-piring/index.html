<!DOCTYPE html>
<html lang="id">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Isi Piringku - ARES Modul 3</title>
  
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <link rel="stylesheet" href="../../shared/ar-styles.css">
  
  <style>
    .highlight-msg {
      position: absolute;
      bottom: 130px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(245, 158, 11, 0.9);
      color: white;
      padding: 1rem;
      border-radius: 16px;
      font-weight: 700;
      text-align: center;
      box-shadow: 0 10px 25px rgba(245, 158, 11, 0.4);
      opacity: 0;
      transition: opacity 0.5s ease, transform 0.5s ease;
      pointer-events: none;
      width: 80%;
      max-width: 350px;
    }
    .highlight-msg.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .food-buttons {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      padding: 0 10px;
      z-index: 1000;
      pointer-events: auto;
    }
    .food-btn {
      background: rgba(255, 255, 255, 0.9);
      border: 2px solid #3b82f6;
      color: #1e3a8a;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 0.85rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: all 0.2s;
    }
    .food-btn:active {
      transform: scale(0.95);
      background: #3b82f6;
      color: white;
    }
  </style>

  <script>
    window.isTrackingActive = false;

    // Sticky AR Component
    AFRAME.registerComponent('sticky-ar', {
      tick: function () {
        const target = document.querySelector('#target');
        const models = document.querySelector('#models-container');
        if (window.isTrackingActive && target && models && target.object3D.visible) {
          models.setAttribute('visible', true);
          models.object3D.matrixAutoUpdate = false;
          models.object3D.matrix.copy(target.object3D.matrix);
        }
      }
    });

    const foodInfoData = {
      'karbo': { 
        title: 'Makanan Pokok', 
        desc: 'Sumber Karbohidrat. Berfungsi sebagai sumber energi utama untuk aktivitas anak sehari-hari.',
        porsi: '2/3 Dari Setengah Piring'
      },
      'protein': { 
        title: 'Lauk Pauk', 
        desc: 'Sumber Protein. Sangat penting untuk pertumbuhan sel dan mencegah stunting.',
        porsi: '1/3 Dari Setengah Piring'
      },
      'sayur': { 
        title: 'Sayuran', 
        desc: 'Sumber Serat. Menjaga pencernaan tetap sehat dan mendukung metabolisme.',
        porsi: '2/3 Dari Setengah Piring'
      },
      'buah': { 
        title: 'Buah-buahan', 
        desc: 'Sumber Vitamin. Kaya akan vitamin alami untuk menjaga sistem kekebalan tubuh.',
        porsi: '1/3 Dari Setengah Piring'
      }
    };
  </script>
</head>
<body>
  
  <!-- Loading Screen (Global UX) -->
  <div id="loading-screen" class="loading-screen">
    <div class="loader-spinner"></div>
    <h2>Memuat Keajaiban AR...</h2>
    
    <div class="progress-container">
      <div id="progress-bar" class="progress-bar"></div>
    </div>
    <div id="loading-status" class="loading-status">Menyiapkan Kamera...</div>
    
    <p>Mohon tunggu sebentar, kami sedang menyiapkan modul edukasi untuk Anda.</p>
    <div class="permission-note">📷 Jika muncul notifikasi, izinkan akses kamera.</div>
  </div>

  <div class="ar-ui-layer">
    <div class="top-nav" style="display: flex; justify-content: space-between; width: 100%;">
      <a href="../../index.html" class="back-btn interactive"><span>←</span> Kembali</a>
      <button id="btn-rescan" class="back-btn interactive" style="display: none; background: #ef4444; color: white; border: none; font-weight: bold; cursor: pointer;">✕ Tutup Model</button>
    </div>
    <div id="scanning-guide" class="scanning-overlay">
      <div class="scanning-text">Arahkan ke halaman 3 (Isi Piring)</div>
    </div>
    <div id="food-buttons-container" class="food-buttons" style="display: none;">
      <button class="food-btn" data-food="karbo">Karbohidrat</button>
      <button class="food-btn" data-food="protein">Protein Hewani</button>
      <button class="food-btn" data-food="sayur">Sayuran</button>
      <button class="food-btn" data-food="buah">Buah-buahan</button>
    </div>
  </div>

  <div id="highlight-msg" class="highlight-msg">
    "Setiap kali makan, usahakan selalu ada PROTEIN HEWANI!"
  </div>

  <!-- Dynamic Info Panel -->
  <div id="info-panel" class="info-panel">
    <div class="panel-header">
      <h3 id="panel-title" class="panel-title">Kelompok Makanan</h3>
      <button id="close-panel" class="close-btn interactive">✕</button>
    </div>
    <div class="panel-content">
      <div id="panel-porsi" style="font-size: 1.15rem; font-weight: 900; color: #10b981; margin-bottom: 0.5rem;"></div>
      <p id="panel-content-text" style="margin-top: 0;"></p>
    </div>
  </div>

  <a-scene sticky-ar
    mindar-image="imageTargetSrc: ./hal3.mind; autoStart: true; uiScanning: #scanning-guide" 
    color-space="sRGB" 
    renderer="colorManagement: true; physicallyCorrectLights: true" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false"
    gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/versioned/decoders/1.5.6/; basisTranscoderPath: https://cdn.jsdelivr.net/npm/three@0.154.0/examples/jsm/libs/basis/; meshoptDecoderPath: https://unpkg.com/meshoptimizer@0.19.0/meshopt_decoder.js;">
    
    <a-assets>
      <a-asset-item id="piring" src="../../models/piring_makanan.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0"></a-entity>
    
    <a-entity id="models-container" visible="false">
      <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
      <a-light type="directional" color="#ffffff" intensity="0.6" position="0 1 1"></a-light>
      
      <!-- Piring Makanan -->
      <a-gltf-model id="plate-model" src="#piring" position="0 0 0" scale="0 0 0" rotation="90 0 0"
        animation__appear="property: scale; from: 0 0 0; to: 0.05 0.05 0.05; dur: 1000; easing: easeOutElastic; startEvents: appear">
      </a-gltf-model>
      
    </a-entity>
  </a-scene>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const target = document.querySelector('#target');
      const scanningGuide = document.querySelector('#scanning-guide');
      const infoPanel = document.querySelector('#info-panel');
      const closePanel = document.querySelector('#close-panel');
      const btnRescan = document.querySelector('#btn-rescan');
      const modelsContainer = document.querySelector('#models-container');
      const foodBtnsContainer = document.querySelector('#food-buttons-container');
      const foodBtns = document.querySelectorAll('.food-btn');
      const plateModel = document.querySelector('#plate-model');

      // Loading Progress Logic
      const progressBar = document.getElementById('progress-bar');
      const loadingStatus = document.getElementById('loading-status');
      let progress = 0;
      let msgIndex = 0;
      const messages = ["Menyiapkan Kamera...", "Mengunduh Aset 3D...", "Membangun Ruang AR...", "Hampir Siap..."];
      
      const interval = setInterval(() => {
        if (progress < 90) {
          progress += Math.random() * 15;
          if(progress > 90) progress = 90;
          if(progressBar) progressBar.style.width = `${progress}%`;
          
          if(progress > 25 && msgIndex === 0) { msgIndex++; loadingStatus.textContent = messages[msgIndex]; }
          if(progress > 50 && msgIndex === 1) { msgIndex++; loadingStatus.textContent = messages[msgIndex]; }
          if(progress > 75 && msgIndex === 2) { msgIndex++; loadingStatus.textContent = messages[msgIndex]; }
        }
      }, 800);

      // Hide Loading Screen when AR is ready
      document.querySelector('a-scene').addEventListener('arReady', () => {
        clearInterval(interval);
        if(progressBar) progressBar.style.width = '100%';
        if(loadingStatus) loadingStatus.textContent = "Selesai!";
        setTimeout(() => {
          document.getElementById('loading-screen').classList.add('hidden');
        }, 500);
      });

      target.addEventListener("targetFound", () => {
        window.isTrackingActive = true;
        scanningGuide.style.display = 'none';
        btnRescan.style.display = 'block';
        
        // Animate the plate
        setTimeout(() => {
          if(!window.isTrackingActive) return;
          plateModel.emit('appear');
          
          setTimeout(() => {
            if(window.isTrackingActive) {
              document.getElementById('highlight-msg').classList.add('visible');
              foodBtnsContainer.style.display = 'flex';
            }
          }, 1000);
        }, 500);
      });

      target.addEventListener("targetLost", () => {
        // Sticky AR: do nothing
      });

      btnRescan.addEventListener('click', () => {
        window.isTrackingActive = false;
        modelsContainer.setAttribute('visible', false);
        btnRescan.style.display = 'none';
        foodBtnsContainer.style.display = 'none';
        document.getElementById('highlight-msg').classList.remove('visible');
        scanningGuide.style.display = 'flex';
        infoPanel.classList.remove('visible');
        
        // Reset plate
        plateModel.setAttribute('scale', '0 0 0');
      });

      closePanel.addEventListener('click', () => {
        infoPanel.classList.remove('visible');
      });

      // Buttons click logic
      foodBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          const data = foodInfoData[btn.dataset.food];
          if(data) {
            document.getElementById('panel-title').textContent = data.title;
            document.getElementById('panel-porsi').textContent = "Porsi: " + data.porsi;
            document.getElementById('panel-content-text').textContent = data.desc;
            infoPanel.classList.add('visible');
          }
        });
      });
    });
  </script>
</body>
</html>
