<!DOCTYPE html>
<html lang="id">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Protein Hewani - ARES Modul 2</title>
  
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <link rel="stylesheet" href="../../shared/ar-styles.css">
  
  <style>
    /* Styling for the dynamic food info panel */
    #panel-gizi {
      color: #3b82f6;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    #panel-manfaat {
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    .recipe-list {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 1rem;
    }
    .recipe-list h4 { margin-top: 0; color: #10b981; }
    .food-buttons {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      padding: 0 10px;
      z-index: 1000;
      pointer-events: auto;
    }
    .food-btn {
      background: rgba(255, 255, 255, 0.9);
      border: 2px solid #3b82f6;
      color: #1e3a8a;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 0.85rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: all 0.2s;
    }
    .food-btn:active {
      transform: scale(0.95);
      background: #3b82f6;
      color: white;
    }
  </style>

  <script>
    window.isTrackingActive = false;

    // Sticky AR Component
    AFRAME.registerComponent('sticky-ar', {
      tick: function () {
        const target = document.querySelector('#target');
        const models = document.querySelector('#models-container');
        if (window.isTrackingActive && target && models && target.object3D.visible) {
          models.setAttribute('visible', true);
          models.object3D.matrixAutoUpdate = false;
          models.object3D.matrix.copy(target.object3D.matrix);
        }
      }
    });

    // Food Database
    const foodData = {
      'lele': {
        title: 'Ikan Lele',
        gizi: 'Protein, Lemak Sehat, Vit D & B12',
        manfaat: 'Membantu pembentukan sel otak dan sistem kekebalan tubuh.',
        olahan: ['Lele Goreng Kremes', 'Nugget Lele', 'Mangut Lele Balita']
      },
      'telur': {
        title: 'Telur Ayam',
        gizi: 'Protein Tinggi, Kolin',
        manfaat: 'Sangat baik untuk perkembangan kognitif dan kecerdasan otak anak.',
        olahan: ['Telur Orak-Arik Sayur', 'Puding Telur', 'Telur Rebus Halus']
      },
      'ikan': {
        title: 'Ikan Laut',
        gizi: 'Omega-3, Iodium, Zinc',
        manfaat: 'Mencegah gangguan pertumbuhan dan meningkatkan fungsi penglihatan.',
        olahan: ['Sup Ikan Bening', 'Bakso Ikan', 'Ikan Kukus Jahe']
      },
      'hati': {
        title: 'Hati Ayam',
        gizi: 'Zat Besi, Vit A, Folat, B12',
        manfaat: 'Mencegah anemia yang sering menjadi penyebab stunting tidak langsung.',
        olahan: ['Tim Hati Ayam', 'Sate Lilit Hati', 'Bubur Hati Ayam']
      },
      'daging': {
        title: 'Daging Sapi',
        gizi: 'Protein, Zat Besi, Zinc',
        manfaat: 'Membantu pembentukan otot dan perbaikan jaringan tubuh yang rusak.',
        olahan: ['Semur Daging Cincang', 'Bola Daging Sayur', 'Kaldu Daging Sapi']
      }
    };

  </script>
</head>
<body>
  
  <!-- Loading Screen (Global UX) -->
  <div id="loading-screen" class="loading-screen">
    <div class="loader-spinner"></div>
    <h2>Memuat Keajaiban AR...</h2>
    
    <div class="progress-container">
      <div id="progress-bar" class="progress-bar"></div>
    </div>
    <div id="loading-status" class="loading-status">Menyiapkan Kamera...</div>
    
    <p>Mohon tunggu sebentar, kami sedang menyiapkan modul edukasi untuk Anda.</p>
    <div class="permission-note">📷 Jika muncul notifikasi, izinkan akses kamera.</div>
  </div>

  <div class="ar-ui-layer">
    <div class="top-nav" style="display: flex; justify-content: space-between; width: 100%;">
      <a href="../../index.html" class="back-btn interactive"><span>←</span> Kembali</a>
      <button id="btn-rescan" class="back-btn interactive" style="display: none; background: #ef4444; color: white; border: none; font-weight: bold; cursor: pointer;">✕ Tutup Model</button>
    </div>
    <div id="scanning-guide" class="scanning-overlay">
      <div class="scanning-text">Arahkan ke halaman 2 (Protein Hewani)</div>
    </div>
    <div id="food-buttons-container" class="food-buttons" style="display: none;">
      <button class="food-btn" data-food="telur">Telur Ayam</button>
      <button class="food-btn" data-food="lele">Ikan Lele</button>
      <button class="food-btn" data-food="ikan">Ikan Laut</button>
      <button class="food-btn" data-food="hati">Hati Ayam</button>
      <button class="food-btn" data-food="daging">Daging Sapi</button>
    </div>
  </div>

  <!-- Dynamic Info Panel -->
  <div id="info-panel" class="info-panel">
    <div class="panel-header">
      <h3 id="panel-title" class="panel-title">Nama Makanan</h3>
      <button id="close-panel" class="close-btn">✕</button>
    </div>
    <div class="panel-content">
      <div id="panel-gizi"></div>
      <div id="panel-manfaat"></div>
      <div id="panel-olahan"></div>
    </div>
  </div>

  <a-scene sticky-ar
    mindar-image="imageTargetSrc: ./hal2.mind; autoStart: true; uiScanning: #scanning-guide" 
    color-space="sRGB" 
    renderer="colorManagement: true; physicallyCorrectLights: true" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false"
    gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/versioned/decoders/1.5.6/; basisTranscoderPath: https://cdn.jsdelivr.net/npm/three@0.154.0/examples/jsm/libs/basis/; meshoptDecoderPath: https://unpkg.com/meshoptimizer@0.19.0/meshopt_decoder.js;">
    
    <a-assets>
      <a-asset-item id="lele" src="../../models/lele.glb"></a-asset-item>
      <a-asset-item id="telur" src="../../models/telur.glb"></a-asset-item>
      <a-asset-item id="ikan" src="../../models/ikan.glb"></a-asset-item>
      <a-asset-item id="hati" src="../../models/hati_ayam.glb"></a-asset-item>
      <a-asset-item id="daging" src="../../models/daging_sapi.glb"></a-asset-item>
    </a-assets>

    <!-- Simple camera without raycaster -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0"></a-entity>
    
    <a-entity id="models-container" visible="false">
      
      <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
      <a-light type="directional" color="#ffffff" intensity="0.6" position="0 1 1"></a-light>
      
      <a-gltf-model id="obj-telur" src="#telur" position="0 0.05 -0.6" scale="3.26 3.26 3.26" rotation="90 0 0"></a-gltf-model>
      <a-gltf-model id="obj-lele" src="#lele" position="-1.05 0 -0.75" scale="0.06 0.06 0.06" rotation="90 5 0"></a-gltf-model>
      <a-gltf-model id="obj-ikan" src="#ikan" position="1.1 0.1 -0.5" scale="0.06 0.06 0.06" rotation="-90 180 0"></a-gltf-model>
      <a-gltf-model id="obj-hati" src="#hati" position="0.1 1.15 -0.45" scale="1.18 1.18 1.18" rotation="90 0 0"></a-gltf-model>
      <a-gltf-model id="obj-daging" src="#daging" position="0 -1.15 -0.7" scale="0.07 0.07 0.07" rotation="90 0 0"></a-gltf-model>
      
    </a-entity>
  </a-scene>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const target = document.querySelector('#target');
      const scanningGuide = document.querySelector('#scanning-guide');
      const infoPanel = document.querySelector('#info-panel');
      const closePanel = document.querySelector('#close-panel');
      const btnRescan = document.querySelector('#btn-rescan');
      const modelsContainer = document.querySelector('#models-container');
      const foodBtnsContainer = document.querySelector('#food-buttons-container');
      const foodBtns = document.querySelectorAll('.food-btn');

      // Loading Progress Logic
      const progressBar = document.getElementById('progress-bar');
      const loadingStatus = document.getElementById('loading-status');
      let progress = 0;
      let msgIndex = 0;
      const messages = ["Menyiapkan Kamera...", "Mengunduh Aset 3D...", "Membangun Ruang AR...", "Hampir Siap..."];
      
      const interval = setInterval(() => {
        if (progress < 90) {
          progress += Math.random() * 15;
          if(progress > 90) progress = 90;
          if(progressBar) progressBar.style.width = `${progress}%`;
          
          if(progress > 25 && msgIndex === 0) { msgIndex++; loadingStatus.textContent = messages[msgIndex]; }
          if(progress > 50 && msgIndex === 1) { msgIndex++; loadingStatus.textContent = messages[msgIndex]; }
          if(progress > 75 && msgIndex === 2) { msgIndex++; loadingStatus.textContent = messages[msgIndex]; }
        }
      }, 800);

      // Hide Loading Screen when AR is ready
      document.querySelector('a-scene').addEventListener('arReady', () => {
        clearInterval(interval);
        if(progressBar) progressBar.style.width = '100%';
        if(loadingStatus) loadingStatus.textContent = "Selesai!";
        setTimeout(() => {
          document.getElementById('loading-screen').classList.add('hidden');
        }, 500);
      });

      target.addEventListener("targetFound", () => {
        window.isTrackingActive = true;
        scanningGuide.style.display = 'none';
        btnRescan.style.display = 'block';
        foodBtnsContainer.style.display = 'flex';
      });

      // Target lost does NOTHING now, so models freeze on screen
      target.addEventListener("targetLost", () => {
        // model stays visible on screen
      });

      // User clicks X button to rescan
      btnRescan.addEventListener('click', () => {
        window.isTrackingActive = false;
        modelsContainer.setAttribute('visible', false);
        btnRescan.style.display = 'none';
        foodBtnsContainer.style.display = 'none';
        scanningGuide.style.display = 'flex';
        infoPanel.classList.remove('visible');
      });

      closePanel.addEventListener('click', () => {
        infoPanel.classList.remove('visible');
      });

      // Logic for new HTML buttons
      foodBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          const data = foodData[btn.dataset.food];
          if(data) {
            document.getElementById('panel-title').textContent = data.title;
            document.getElementById('panel-gizi').textContent = data.gizi;
            document.getElementById('panel-manfaat').textContent = data.manfaat;
            
            const olahanHtml = data.olahan.map(item => `<li>${item}</li>`).join('');
            document.getElementById('panel-olahan').innerHTML = `<div class="recipe-list"><h4>Ide Olahan:</h4><ul>${olahanHtml}</ul></div>`;
            
            infoPanel.classList.add('visible');
          }
        });
      });
    });
  </script>
</body>
</html>
